<style>
    #shinyArcadeOverlayBackdrop{
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 10000;
      display: none;
    }
    #shinyArcadeOverlayPanel{
      position: fixed;
      left: 16px;
      bottom: 16px;
      width: 38%;
      min-width: 320px;
      max-width: 90vw;
      height: calc(100vh - 32px);
      background: white;
      border-radius: 14px;
      overflow: auto;
      resize: horizontal;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      z-index: 10001;
      display: none;
    }
    #shinyArcadeOverlayHeader{
      display:flex; align-items:center; justify-content:space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px;
    }
    #shinyArcadeOverlayHeader .hint{ opacity: .7; font-size: 12px; }
    #shinyArcadeFrame{
      width: 100%;
      height: calc(100% - 44px);
      border: 0;
    }
    </style>

    <div id="shinyArcadeOverlayBackdrop"></div>

    <div id="shinyArcadeOverlayPanel" role="dialog" aria-modal="true">
      <div id="shinyArcadeOverlayHeader">
        <div>
          <strong>Arcade Console</strong>
          <div class="hint">Hotkey: "]" to toggle &bull; Esc to close</div>
        </div>
        <button id="closeShinyArcadeOverlayBtn" style="font-size:14px;">Close</button>
      </div>
      <iframe id="shinyArcadeFrame" src="http://shiny.kylecoombs.com/home/"></iframe>
    </div>

    <script>
    (function(){
      const panel = document.getElementById("shinyArcadeOverlayPanel");
      const backdrop = document.getElementById("shinyArcadeOverlayBackdrop");
      const closeBtn = document.getElementById("closeShinyArcadeOverlayBtn");

      function open(){
        backdrop.style.display = "block";
        panel.style.display = "block";
      }
      function close(){
        panel.style.display = "none";
        backdrop.style.display = "none";
      }
      function toggle(){
        const openNow = panel.style.display === "block";
        openNow ? close() : open();
      }

      // Hotkeys: "]" toggles, Esc closes
      document.addEventListener("keydown", (e) => {
        // avoid triggering while typing inside an iframe or input in the slides
        if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;

        if (e.key === "]") { e.preventDefault(); toggle(); }
        if (e.key === "Escape") { close(); }
      });

      backdrop.addEventListener("click", close);
      closeBtn.addEventListener("click", close);
    })();
    </script>
